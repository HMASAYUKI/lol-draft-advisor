<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LoL ドラフトアドバイザー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif;background:#060b14;color:#fff;}
.app{padding:10px;max-width:700px;margin:0 auto;}

.search-bar{display:flex;gap:8px;margin-bottom:8px;align-items:center;}
.search-in{flex:1;background:#101825;border:1px solid #1e3050;border-radius:8px;color:#c8d8f0;padding:7px 11px;font-size:14px;}
.search-in:focus{outline:none;border-color:#5b9cf6;}
.search-in::placeholder{color:#2a3a50;}
.phase-ind{font-size:10px;padding:3px 10px;border-radius:10px;background:#0a1020;color:#3a5070;border:0.5px solid #1e3050;white-space:nowrap;}

/* チャンプグリッド */
.champ-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:5px;margin-bottom:10px;max-height:220px;overflow-y:auto;}
.cc{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:3px;border-radius:7px;border:2px solid transparent;transition:border-color .1s,background .1s;}
.cc:hover{background:#151f30;}
.cc.sel{border-color:#C89B3C;background:#1a1500;}
.cc.used{opacity:.15;pointer-events:none;}
.cicon{width:52px;height:52px;border-radius:6px;object-fit:cover;display:block;background:#0d1520;}
.cicon-fallback{width:52px;height:52px;border-radius:6px;background:#1a2535;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#4a7aaa;}
.cname{font-size:9px;color:#5a7090;text-align:center;white-space:nowrap;overflow:hidden;width:100%;text-overflow:ellipsis;}
.cc.sel .cname{color:#C89B3C;}

/* BAN */
.bans-section{margin-bottom:8px;}
.bans-inner{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ban-label{font-size:9px;letter-spacing:.06em;margin-bottom:3px;}
.ban-row{display:flex;gap:4px;flex-wrap:wrap;}
.ban-slot{width:40px;height:40px;border-radius:5px;border:0.5px dashed #2a1a1a;background:#0d0808;cursor:pointer;position:relative;overflow:hidden;flex-shrink:0;}
.ban-slot.filled{border:0.5px solid #3a1010;}
.ban-icon{width:40px;height:40px;object-fit:cover;filter:grayscale(80%) brightness(0.35);display:block;}
.ban-fb{width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;filter:brightness(0.35);}
.ban-x{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:15px;color:#dd3333;font-weight:700;}

/* ドラフトボード */
.draft-board{display:grid;grid-template-columns:1fr 28px 1fr;gap:6px;margin-bottom:10px;}
.team-col{display:flex;flex-direction:column;gap:3px;}
.team-label{font-size:10px;font-weight:700;text-align:center;padding:4px 0;border-radius:5px;margin-bottom:2px;}
.blue-lbl{background:#0d1f35;color:#5b9cf6;}
.red-lbl{background:#250d0d;color:#e06060;}
.pick-slot{height:50px;border-radius:7px;display:flex;align-items:center;gap:6px;padding:0 7px;border:1px solid transparent;margin-bottom:3px;}
.pe{background:#0d1520;border:1px dashed #1a2a3a;}
.pb{background:#0d1a2e;border:1px solid #1e3a5a;}
.pr{background:#1f0d0d;border:1px solid #3a1a1a;}
.pm{border-color:#C89B3C88!important;background:#0d1820!important;}
.rdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.slot-icon{width:36px;height:36px;border-radius:4px;object-fit:cover;flex-shrink:0;background:#0d1520;}
.slot-fb{width:36px;height:36px;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;}
.sname{font-size:12px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rbadge{font-size:8px;padding:1px 5px;border-radius:6px;flex-shrink:0;}
.mbadge{font-size:8px;color:#C89B3C;background:#150f00;padding:1px 4px;border-radius:6px;border:0.5px solid #C89B3C55;flex-shrink:0;}
.rm{background:none;border:none;color:#2a3a4a;cursor:pointer;font-size:14px;padding:0;line-height:1;flex-shrink:0;}
.rm:hover{color:#8a9bb8;}
.vs-col{display:flex;align-items:center;justify-content:center;padding-top:24px;font-size:10px;color:#2a3a50;font-weight:700;}

.action-bar{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;}
.abtn{padding:8px 12px;font-size:12px;font-weight:700;border-radius:7px;border:none;cursor:pointer;transition:opacity .12s,transform .1s;white-space:nowrap;}
.abtn:hover{opacity:.82;}.abtn:active{transform:scale(.96);}
.bp{background:#1a4a8a;color:#88c0f8;}
.rp{background:#4a1a1a;color:#f08080;}
.bb{background:#0d2a4a;color:#4a80cc;}
.rb{background:#2a1010;color:#cc5555;}
.rs{background:#151a25;color:#3a4a5a;}

.advice-wrap{margin-top:4px;}
.abox{background:#0a1020;border:0.5px solid #1e3050;border-radius:8px;padding:10px;margin-bottom:8px;}
.abox.gold{border-color:#C89B3C55;}
.ahdr{font-size:11px;font-weight:700;color:#5b9cf6;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
.ahdr.g{color:#C89B3C;}
.abody{font-size:12px;color:#7a9ab8;line-height:1.75;white-space:pre-wrap;}
.lrow{display:flex;align-items:center;gap:6px;color:#3a5070;font-size:12px;padding:4px 0;}
.dot{width:4px;height:4px;border-radius:50%;background:#5b9cf6;animation:p 1.1s infinite;}
.dot:nth-child(2){animation-delay:.18s;}.dot:nth-child(3){animation-delay:.36s;}
@keyframes p{0%,80%,100%{opacity:.15}40%{opacity:1}}
</style>
</head>
<body>
<div class="app">
  <div class="search-bar">
    <input class="search-in" id="search" placeholder="チャンピオン名で検索（日本語・英語OK）..." oninput="filterChamps()"/>
    <span class="phase-ind" id="phase-ind">待機中</span>
  </div>
  <div class="champ-grid" id="champ-grid"></div>
  <div class="bans-section">
    <div class="bans-inner">
      <div>
        <div class="ban-label" style="color:#4a80cc">青チーム BAN</div>
        <div class="ban-row" id="blue-bans"></div>
      </div>
      <div>
        <div class="ban-label" style="color:#cc4a4a;text-align:right">赤チーム BAN</div>
        <div class="ban-row" id="red-bans" style="justify-content:flex-end"></div>
      </div>
    </div>
  </div>
  <div class="draft-board">
    <div class="team-col">
      <div class="team-label blue-lbl">青チーム（味方）</div>
      <div id="blue-picks"></div>
    </div>
    <div class="vs-col">VS</div>
    <div class="team-col">
      <div class="team-label red-lbl">赤チーム（相手）</div>
      <div id="red-picks"></div>
    </div>
  </div>
  <div class="action-bar">
    <button class="abtn bp" onclick="doAction('blue-pick')">味方にピック</button>
    <button class="abtn rp" onclick="doAction('red-pick')">相手にピック</button>
    <button class="abtn bb" onclick="doAction('blue-ban')">味方でBAN</button>
    <button class="abtn rb" onclick="doAction('red-ban')">相手でBAN</button>
    <button class="abtn rs" onclick="resetAll()">リセット</button>
  </div>
  <div class="advice-wrap" id="advice-area"></div>
</div>

<script>
const CHAMPS=[
  {k:'Ahri',      n:'Ahri',          j:'アーリ',              c:'#7a2080'},
  {k:'Akali',     n:'Akali',         j:'アカリ',              c:'#1a5a3a'},
  {k:'Akshan',    n:'Akshan',        j:'アクシャン',          c:'#3a6a1a'},
  {k:'Anivia',    n:'Anivia',        j:'アニビア',            c:'#2a5a8a'},
  {k:'Annie',     n:'Annie',         j:'アニー',              c:'#8a3010'},
  {k:'AurelionSol',n:'Aurelion Sol', j:'オレリオン・ソル',    c:'#3a2880'},
  {k:'Azir',      n:'Azir',          j:'アジール',            c:'#9a7a10'},
  {k:'Brand',     n:'Brand',         j:'ブランド',            c:'#9a3a00'},
  {k:'Cassiopeia',n:'Cassiopeia',    j:'カシオペア',          c:'#2a4a1a'},
  {k:'Corki',     n:'Corki',         j:'コーキ',              c:'#6a4a10'},
  {k:'Diana',     n:'Diana',         j:'ダイアナ',            c:'#303070'},
  {k:'Ekko',      n:'Ekko',          j:'エコー',              c:'#205060'},
  {k:'Fizz',      n:'Fizz',          j:'フィズ',              c:'#104a8a'},
  {k:'Galio',     n:'Galio',         j:'ガリオ',              c:'#2a3a5a'},
  {k:'Heimerdinger',n:'Heimerdinger',j:'ハイマー',            c:'#7a7a10'},
  {k:'Irelia',    n:'Irelia',        j:'イレリア',            c:'#4a2880'},
  {k:'Jayce',     n:'Jayce',         j:'ジェイス',            c:'#2a3a6a'},
  {k:'Katarina',  n:'Katarina',      j:'カタリナ',            c:'#7a1010'},
  {k:'Leblanc',   n:'LeBlanc',       j:'ルブラン',            c:'#5a2070'},
  {k:'Lissandra', n:'Lissandra',     j:'リサンドラ',          c:'#103050'},
  {k:'Lux',       n:'Lux',           j:'ラックス',            c:'#9a7a10'},
  {k:'Malzahar',  n:'Malzahar',      j:'マルザハール',        c:'#3a1080'},
  {k:'Naafiri',   n:'Naafiri',       j:'ナーフィリ',          c:'#6a3a10'},
  {k:'Neeko',     n:'Neeko',         j:'ニーコ',              c:'#106a3a'},
  {k:'Orianna',   n:'Orianna',       j:'オリアナ',            c:'#7a4a10'},
  {k:'Pantheon',  n:'Pantheon',      j:'パンテオン',          c:'#4a2a10'},
  {k:'Qiyana',    n:'Qiyana',        j:'キヤナ',              c:'#2a4a1a'},
  {k:'Ryze',      n:'Ryze',          j:'ライズ',              c:'#10309a'},
  {k:'Seraphine', n:'Seraphine',     j:'セラフィーン',        c:'#5a2870'},
  {k:'Smolder',   n:'Smolder',       j:'スモルダー',          c:'#8a3a10'},
  {k:'Sylas',     n:'Sylas',         j:'サイラス',            c:'#203050'},
  {k:'Syndra',    n:'Syndra',        j:'シンドラ',            c:'#3a1880'},
  {k:'Taliyah',   n:'Taliyah',       j:'タリヤ',              c:'#7a4a20'},
  {k:'Talon',     n:'Talon',         j:'タロン',              c:'#202040'},
  {k:'TwistedFate',n:'Twisted Fate', j:'ツイステッドフェイト',c:'#7a6010'},
  {k:'Veigar',    n:'Veigar',        j:'ベイガー',            c:'#301870'},
  {k:'Vex',       n:'Vex',           j:'ヴェックス',          c:'#383848'},
  {k:'Viktor',    n:'Viktor',        j:'ビクター',            c:'#282838'},
  {k:'Vladimir',  n:'Vladimir',      j:'ブラッドミア',        c:'#6a1010'},
  {k:'Xerath',    n:'Xerath',        j:'ゼラス',              c:'#104870'},
  {k:'Yasuo',     n:'Yasuo',         j:'ヤスオ',              c:'#384828'},
  {k:'Yone',      n:'Yone',          j:'ヨネ',                c:'#282038'},
  {k:'Zed',       n:'Zed',           j:'ゼド',                c:'#303848'},
  {k:'Ziggs',     n:'Ziggs',         j:'ジグス',              c:'#787010'},
  {k:'Zoe',       n:'Zoe',           j:'ゾーイ',              c:'#5a4070'},
];

const ROLES=['TOP','JG','MID','BOT','SUP'];
const RJ={TOP:'トップ',JG:'ジャングル',MID:'ミッド',BOT:'ボット',SUP:'サポート'};
const RC={TOP:'#4a7aaa',JG:'#4a9a6a',MID:'#9a7aaa',BOT:'#aa7a4a',SUP:'#aa4a7a'};
const INI={AurelionSol:'AS',TwistedFate:'TF'};

function ini(c){return INI[c.k]||c.n.slice(0,2);}
function iconPath(k){return`./icons/${k}.png`;}

// アイコン：画像あれば使い、なければカラーブロック
function iconEl(c,size,extra){
  const r=size>40?6:4;
  const fs=size>40?12:9;
  const st=extra||'';
  return `<img src="${iconPath(c.k)}" width="${size}" height="${size}"
    style="border-radius:${r}px;object-fit:cover;display:block;flex-shrink:0;${st}"
    onerror="this.outerHTML='<div style=width:${size}px;height:${size}px;border-radius:${r}px;background:${c.c};display:flex;align-items:center;justify-content:center;font-size:${fs}px;font-weight:700;color:#fff;flex-shrink:0>${ini(c)}</div>'">`;
}

let sel=null;
let bP=ROLES.map((r,i)=>({champ:null,role:r,mine:i===2}));
let rP=ROLES.map(r=>({champ:null,role:r,mine:false}));
let bB=Array(5).fill(null);
let rB=Array(5).fill(null);
let filtered=[...CHAMPS];
let advTm=null,lastKey='';

function bannedKeys(){return[...bB,...rB].filter(Boolean).map(x=>x.k);}
function pickedKeys(){return[...bP,...rP].filter(s=>s.champ).map(s=>s.champ.k);}
function usedKeys(){return[...bannedKeys(),...pickedKeys()];}

function filterChamps(){
  const q=document.getElementById('search').value.toLowerCase();
  filtered=q?CHAMPS.filter(c=>c.n.toLowerCase().includes(q)||c.j.toLowerCase().includes(q)||c.k.toLowerCase().includes(q)):[...CHAMPS];
  renderGrid();
}

function renderGrid(){
  const used=usedKeys();
  document.getElementById('champ-grid').innerHTML=filtered.map(c=>{
    const idx=CHAMPS.indexOf(c);
    const isUsed=used.includes(c.k);
    const isSel=sel&&sel.k===c.k;
    return`<div class="cc${isSel?' sel':''}${isUsed?' used':''}" onclick="selectChamp(${idx})">
      <div style="position:relative;display:inline-block;">
        ${iconEl(c,52)}
        ${isSel?`<div style="position:absolute;inset:0;border:2.5px solid #C89B3C;border-radius:6px;pointer-events:none"></div>`:''}
      </div>
      <div class="cname">${c.j}</div>
    </div>`;
  }).join('');
}

function selectChamp(idx){
  const c=CHAMPS[idx];
  if(usedKeys().includes(c.k))return;
  sel=(sel&&sel.k===c.k)?null:c;
  renderGrid();
}

function doAction(type){
  if(!sel)return;
  const c=sel;
  if(usedKeys().includes(c.k))return;
  if(type==='blue-pick'){const s=bP.find(x=>!x.champ);if(s)s.champ=c;}
  else if(type==='red-pick'){const s=rP.find(x=>!x.champ);if(s)s.champ=c;}
  else if(type==='blue-ban'){const i=bB.findIndex(x=>x===null);if(i!==-1)bB[i]=c;}
  else if(type==='red-ban'){const i=rB.findIndex(x=>x===null);if(i!==-1)rB[i]=c;}
  sel=null;renderAll();scheduleAdvice();
}

function removeSlot(team,i){(team==='blue'?bP:rP)[i].champ=null;renderAll();scheduleAdvice();}
function removeBan(team,i){if(team==='blue')bB[i]=null;else rB[i]=null;renderAll();scheduleAdvice();}
function renderAll(){renderGrid();renderPicks();renderBans();updatePhase();}

function renderPicks(){
  const mk=(s,i,side)=>{
    const f=!!s.champ;
    const rc=RC[s.role]||'#4a6a8a';
    let cls='pick-slot ';
    if(!f)cls+='pe';
    else{cls+=(side==='blue'?'pb':'pr');if(s.mine)cls+=' pm';}
    return`<div class="${cls}">
      <div class="rdot" style="background:${rc}"></div>
      ${f
        ?`${iconEl(s.champ,36)}
          <span class="sname" style="color:${side==='red'?'#f08888':'#c8d8f0'}">${s.champ.j}</span>
          <span class="rbadge" style="background:${rc}22;color:${rc}">${RJ[s.role]}</span>
          ${s.mine?'<span class="mbadge">YOU</span>':''}
          <button class="rm" onclick="removeSlot('${side}',${i})">×</button>`
        :`<span style="font-size:11px;color:#1e3050">${RJ[s.role]}</span>`
      }
    </div>`;
  };
  document.getElementById('blue-picks').innerHTML=bP.map((s,i)=>mk(s,i,'blue')).join('');
  document.getElementById('red-picks').innerHTML=rP.map((s,i)=>mk(s,i,'red')).join('');
}

function renderBans(){
  const mk=(b,i,team)=>{
    if(!b)return`<div class="ban-slot"></div>`;
    return`<div class="ban-slot filled" onclick="removeBan('${team}',${i})" title="${b.j}をBANから外す">
      <img src="${iconPath(b.k)}" width="40" height="40"
        style="object-fit:cover;filter:grayscale(80%) brightness(0.35);display:block;"
        onerror="this.outerHTML='<div style=width:40px;height:40px;background:${b.c};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;filter:brightness(0.35)>${ini(b)}</div>'">
      <div class="ban-x">✕</div>
    </div>`;
  };
  document.getElementById('blue-bans').innerHTML=bB.map((b,i)=>mk(b,i,'blue')).join('');
  document.getElementById('red-bans').innerHTML=rB.map((b,i)=>mk(b,i,'red')).join('');
}

function updatePhase(){
  const total=[...bP,...rP].filter(s=>s.champ).length;
  const el=document.getElementById('phase-ind');
  if(total===10){el.textContent='全員確定';el.style.color='#5a9a5a';el.style.background='#0a2010';el.style.borderColor='#2a5a2a55';}
  else if(total>0){el.textContent=`ピック中 ${total}/10`;el.style.color='#C89B3C';el.style.background='#150f00';el.style.borderColor='#C89B3C44';}
  else{el.textContent='待機中';el.style.color='#3a5070';el.style.background='#0a1020';el.style.borderColor='#1e3050';}
}

function scheduleAdvice(){
  if(advTm)clearTimeout(advTm);
  const total=[...bP,...rP].filter(s=>s.champ).length;
  if(total===0)return;
  advTm=setTimeout(()=>fetchAdvice(total>=10),total>=10?400:1500);
}

function stateKey(){return bP.map(s=>s.champ?s.champ.k:'_').join()+rP.map(s=>s.champ?s.champ.k:'_').join();}

async function fetchAdvice(isFinal){
  const key=stateKey();
  if(key===lastKey)return;
  lastKey=key;
  const area=document.getElementById('advice-area');
  area.innerHTML=`<div class="abox"><div class="lrow"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span>${isFinal?'最終アドバイスを生成中...':'ピック候補を更新中...'}</span></div></div>`;
  area.scrollIntoView({behavior:'smooth',block:'nearest'});

  const bp=bP.filter(s=>s.champ).map(s=>`${s.champ.j}(${RJ[s.role]})`).join('、')||'なし';
  const rp=rP.filter(s=>s.champ).map(s=>`${s.champ.j}(${RJ[s.role]})`).join('、')||'なし';
  const bb=bB.filter(Boolean).map(c=>c.j).join('、')||'なし';
  const rb=rB.filter(Boolean).map(c=>c.j).join('、')||'なし';
  const myMid=bP[2];

  const prompt=isFinal
    ?`あなたはLoLの上級コーチです。以下のドラフト確定情報をもとに日本語で詳細アドバイスをください。

自チーム（青）: ${bp}
相手チーム（赤）: ${rp}
自チームのBAN: ${bb}
相手チームのBAN: ${rb}
自分のチャンピオン（ミッド）: ${myMid.champ?myMid.champ.j:'未確定'}

以下の4つのセクションで回答してください（プレーンテキスト、マークダウン不使用）：

【ビルドの方向性】
スタータアイテム→コアアイテム3〜4個（各選ぶ理由）・相手構成への対策アイテム・おすすめルーン（キーストーン＋サブツリー）・スキルオーダーの方針

【序盤の立ち回り】
レーンフェーズでの具体的な動き（CSの取り方・ポジション・ガンクケア）

【中盤〜終盤の動き】
ローテーション・オブジェクト優先度・チームファイトでの役割と動き

【構成の強みと注意点】
この構成で勝てる理由・負けパターン・相手への具体的な対策`
    :`あなたはLoLの上級コーチです。ドラフト途中の状況を踏まえて日本語で簡潔にアドバイスください。

自チーム（青）のピック済み: ${bp}
相手チーム（赤）のピック済み: ${rp}
自チームのBAN: ${bb} / 相手のBAN: ${rb}
担当ロール: ミッド

【おすすめミッドピック】のセクションのみ回答してください：
相手の現在の構成と自チームの噛み合いを踏まえ、今ピックすべきミッドチャンピオンを3体、それぞれ1〜2文で理由を添えて教えてください。`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:isFinal?1200:500,messages:[{role:'user',content:prompt}]})
    });
    if(!res.ok){
      const err=await res.text();
      area.innerHTML=`<div class="abox"><div class="abody" style="color:#aa4040">APIエラー (${res.status}):<br>${esc(err.slice(0,300))}</div></div>`;
      return;
    }
    const data=await res.json();
    const text=data.content.map(b=>b.text||'').join('');

    if(isFinal){
      const secs=[
        {k:'ビルドの方向性',icon:'⚔',cls:''},
        {k:'序盤の立ち回り',icon:'◎',cls:''},
        {k:'中盤〜終盤の動き',icon:'◈',cls:''},
        {k:'構成の強みと注意点',icon:'★',cls:'gold'},
      ];
      let pos=[];
      secs.forEach(s=>{
        const m=new RegExp(`【${s.k}[^】]*】`).exec(text);
        if(m)pos.push({idx:m.index,end:m.index+m[0].length,sec:s});
      });
      pos.sort((a,b)=>a.idx-b.idx);
      const html=pos.map((p,i)=>{
        const end=i+1<pos.length?pos[i+1].idx:text.length;
        return`<div class="abox ${p.sec.cls}" style="margin-bottom:8px;">
          <div class="ahdr ${p.sec.cls?'g':''}">${p.sec.icon} ${p.sec.k}</div>
          <div class="abody">${esc(text.slice(p.end,end).trim())}</div>
        </div>`;
      }).join('');
      area.innerHTML=html||`<div class="abox gold"><div class="ahdr g">★ アドバイス</div><div class="abody">${esc(text.trim())}</div></div>`;
    }else{
      const m=text.match(/【おすすめミッドピック[^】]*】([\s\S]*)/);
      const content=m?m[1].trim():text.trim();
      area.innerHTML=`<div class="abox gold">
        <div class="ahdr g">
          <span>★ おすすめミッドピック</span>
          <span style="font-size:10px;color:#3a5070;font-weight:400">ピックが増えると自動更新</span>
        </div>
        <div class="abody">${esc(content)}</div>
      </div>`;
    }
    area.scrollIntoView({behavior:'smooth',block:'nearest'});
  }catch(e){
    area.innerHTML=`<div class="abox"><div class="abody" style="color:#aa4040">エラー: ${esc(String(e))}</div></div>`;
  }
}

function resetAll(){
  sel=null;
  bP=ROLES.map((r,i)=>({champ:null,role:r,mine:i===2}));
  rP=ROLES.map(r=>({champ:null,role:r,mine:false}));
  bB=Array(5).fill(null);rB=Array(5).fill(null);
  filtered=[...CHAMPS];lastKey='';
  document.getElementById('advice-area').innerHTML='';
  document.getElementById('search').value='';
  renderAll();
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
renderAll();
</script>
