<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LoL ドラフトアドバイザー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif;background:#060b14;color:#fff;}
.app{padding:10px;max-width:700px;margin:0 auto;}

/* フェーズバー */
.phase-bar{background:#0a1020;border:0.5px solid #1e3050;border-radius:8px;padding:8px 12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.phase-title{font-size:13px;font-weight:700;color:#C89B3C;white-space:nowrap;}
.phase-desc{font-size:11px;color:#5a7090;flex:1;text-align:center;}
.phase-count{font-size:11px;color:#3a5070;white-space:nowrap;}

/* チーム選択・FP選択 */
.fp-select{background:#0a1020;border:0.5px solid #C89B3C55;border-radius:8px;padding:12px;margin-bottom:10px;text-align:center;}
.fp-select p{font-size:12px;color:#7a9ab8;margin-bottom:10px;}
.fp-btns{display:flex;gap:10px;justify-content:center;}
.fp-btn{padding:10px 28px;font-size:13px;font-weight:700;border-radius:7px;border:none;cursor:pointer;}
.fp-blue{background:#1a4a8a;color:#88c0f8;}
.fp-red{background:#4a1a1a;color:#f08080;}

/* 検索 */
.search-bar{display:flex;gap:8px;margin-bottom:8px;align-items:center;}
.search-in{flex:1;background:#101825;border:1px solid #1e3050;border-radius:8px;color:#c8d8f0;padding:7px 11px;font-size:14px;}
.search-in:focus{outline:none;border-color:#5b9cf6;}
.search-in::placeholder{color:#2a3a50;}

/* チャンプグリッド */
.champ-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:5px;margin-bottom:10px;max-height:220px;overflow-y:auto;}
.cc{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:3px;border-radius:7px;border:2px solid transparent;transition:border-color .1s,background .1s;}
.cc:hover{background:#151f30;}
.cc.used{opacity:.15;pointer-events:none;}
.cname{font-size:9px;color:#5a7090;text-align:center;white-space:nowrap;overflow:hidden;width:100%;text-overflow:ellipsis;}

/* BANエリア */
.bans-section{margin-bottom:8px;}
.bans-inner{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ban-label{font-size:9px;letter-spacing:.06em;margin-bottom:3px;}
.ban-row{display:flex;gap:4px;flex-wrap:wrap;}
.ban-slot{width:40px;height:40px;border-radius:5px;border:0.5px dashed #2a1a1a;background:#0d0808;position:relative;overflow:hidden;flex-shrink:0;}
.ban-slot.filled{border:0.5px solid #3a1010;}
.ban-slot.next-ban-blue{border:2px solid #5b9cf6;animation:pulse-ban-blue .7s infinite alternate;background:#04101e;}
.ban-slot.next-ban-red{border:2px solid #f06060;animation:pulse-ban-red .7s infinite alternate;background:#1a0404;}
.next-ban-lbl{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;pointer-events:none;}
.next-ban-lbl-text{font-size:8px;font-weight:800;letter-spacing:.04em;line-height:1;}
.next-ban-arrow{font-size:13px;line-height:1;}
.ban-icon{width:40px;height:40px;object-fit:cover;filter:grayscale(80%) brightness(0.35);display:block;}
.ban-x{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:15px;color:#dd3333;font-weight:700;}
@keyframes pulse-ban-blue{
  from{border-color:#5b9cf6;box-shadow:0 0 6px #5b9cf655,inset 0 0 6px #5b9cf622;}
  to{border-color:#88c0ff;box-shadow:0 0 14px #5b9cf6aa,inset 0 0 10px #5b9cf644;background:#071624;}
}
@keyframes pulse-ban-red{
  from{border-color:#f06060;box-shadow:0 0 6px #f0606055,inset 0 0 6px #f0606022;}
  to{border-color:#ff9090;box-shadow:0 0 14px #f06060aa,inset 0 0 10px #f0606044;background:#1e0606;}
}
@keyframes pulse{from{border-color:#C89B3C}to{border-color:#C89B3C88}}

/* ドラフトボード */
.draft-board{display:grid;grid-template-columns:1fr 28px 1fr;gap:6px;margin-bottom:10px;}
.team-col{display:flex;flex-direction:column;gap:3px;}
.team-label{font-size:10px;font-weight:700;text-align:center;padding:4px 0;border-radius:5px;margin-bottom:2px;}
.blue-lbl{background:#0d1f35;color:#5b9cf6;}
.red-lbl{background:#250d0d;color:#e06060;}
.pick-slot{height:50px;border-radius:7px;display:flex;align-items:center;gap:6px;padding:0 7px;border:1px solid transparent;margin-bottom:3px;}
.pe{background:#0d1520;border:1px dashed #1a2a3a;}
.pb{background:#0d1a2e;border:1px solid #1e3a5a;}
.pr{background:#1f0d0d;border:1px solid #3a1a1a;}
.pm{border-color:#C89B3C88!important;background:#0d1820!important;}
.next-pick{border:1.5px solid #C89B3C!important;animation:pulse .8s infinite alternate;}
.rdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.sname{font-size:12px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rbadge{font-size:8px;padding:1px 5px;border-radius:6px;flex-shrink:0;}
.mbadge{font-size:8px;color:#C89B3C;background:#150f00;padding:1px 4px;border-radius:6px;border:0.5px solid #C89B3C55;flex-shrink:0;}
.vs-col{display:flex;align-items:center;justify-content:center;padding-top:24px;font-size:10px;color:#2a3a50;font-weight:700;}

.action-bar{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;}
.abtn{padding:8px 12px;font-size:12px;font-weight:700;border-radius:7px;border:none;cursor:pointer;transition:opacity .12s,transform .1s;white-space:nowrap;}
.abtn:hover{opacity:.82;}.abtn:active{transform:scale(.96);}
.rs{background:#151a25;color:#3a4a5a;}
.undo{background:#1a2030;color:#5a7090;}

.advice-wrap{margin-top:4px;}
.abox{background:#0a1020;border:0.5px solid #1e3050;border-radius:8px;padding:10px;margin-bottom:8px;}
.abox.gold{border-color:#C89B3C55;}
.ahdr{font-size:11px;font-weight:700;color:#5b9cf6;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
.ahdr.g{color:#C89B3C;}
.abody{font-size:12px;color:#7a9ab8;line-height:1.75;white-space:pre-wrap;}
.lrow{display:flex;align-items:center;gap:6px;color:#3a5070;font-size:12px;padding:4px 0;}
.dot{width:4px;height:4px;border-radius:50%;background:#5b9cf6;animation:p 1.1s infinite;}
.dot:nth-child(2){animation-delay:.18s;}.dot:nth-child(3){animation-delay:.36s;}
@keyframes p{0%,80%,100%{opacity:.15}40%{opacity:1}}

/* ロール選択ポップアップ */
#role-popup{position:fixed;inset:0;background:rgba(0,0,0,0.78);display:flex;align-items:center;justify-content:center;z-index:100;}
.role-popup-inner{background:#0d1828;border:1px solid #C89B3C88;border-radius:12px;padding:16px;min-width:210px;}
.role-popup-title{font-size:11px;color:#7a9ab8;margin-bottom:10px;text-align:center;}
.role-popup-champ{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:12px;}
.role-popup-champ-name{font-size:14px;font-weight:700;color:#c8d8f0;}
.role-btn{display:block;width:100%;padding:9px 14px;margin-bottom:5px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:700;text-align:left;transition:opacity .1s;}
.role-btn:hover:not(:disabled){opacity:.8;}
.role-btn:disabled{opacity:0.25;cursor:not-allowed;}
.role-btn:last-child{margin-bottom:0;}
</style>
</head>
<body>
<div class="app">
  <div class="phase-bar">
    <div class="phase-title" id="phase-title">チーム選択</div>
    <div class="phase-desc" id="phase-desc">あなたのチームカラーを選択</div>
    <div class="phase-count" id="phase-count"></div>
  </div>

  <!-- チーム色選択画面 -->
  <div id="team-select">
    <div class="fp-select">
      <p>あなたのチームカラーを選択してください</p>
      <div class="fp-btns">
        <button class="fp-btn fp-blue" onclick="setMyTeam('blue')">青チーム</button>
        <button class="fp-btn fp-red" onclick="setMyTeam('red')">赤チーム</button>
      </div>
    </div>
  </div>

  <!-- FP選択画面 -->
  <div id="fp-select" style="display:none;">
    <div class="fp-select">
      <p>どちらがファーストピック（FP）ですか？</p>
      <div class="fp-btns">
        <button class="fp-btn fp-blue" onclick="setFP('mine')">味方（YOU）がFP</button>
        <button class="fp-btn fp-red" onclick="setFP('opponent')">相手がFP</button>
      </div>
    </div>
  </div>

  <div class="search-bar">
    <input class="search-in" id="search" placeholder="チャンピオン名で検索（ひらがな・カタカナ・英語OK）..." oninput="filterChamps()"/>
  </div>
  <div class="champ-grid" id="champ-grid"></div>

  <div class="bans-section">
    <div class="bans-inner">
      <div>
        <div class="ban-label" id="blue-ban-label" style="color:#4a80cc">青チーム BAN</div>
        <div class="ban-row" id="blue-bans"></div>
      </div>
      <div>
        <div class="ban-label" id="red-ban-label" style="color:#cc4a4a;text-align:right">赤チーム BAN</div>
        <div class="ban-row" id="red-bans" style="justify-content:flex-end"></div>
      </div>
    </div>
  </div>

  <div class="draft-board">
    <div class="team-col">
      <div class="team-label blue-lbl" id="blue-team-label">青チーム</div>
      <div id="blue-picks"></div>
    </div>
    <div class="vs-col">VS</div>
    <div class="team-col">
      <div class="team-label red-lbl" id="red-team-label">赤チーム</div>
      <div id="red-picks"></div>
    </div>
  </div>

  <div class="action-bar">
    <button class="abtn undo" onclick="undoLast()">← 戻す</button>
    <button class="abtn rs" onclick="resetAll()">リセット</button>
  </div>

  <div class="advice-wrap" id="advice-area"></div>
</div>

<!-- ロール選択ポップアップ（味方チームピック時） -->
<div id="role-popup" style="display:none;" onclick="closeRolePopup(event)">
  <div class="role-popup-inner">
    <div class="role-popup-title">ロールを選択してください</div>
    <div class="role-popup-champ" id="role-popup-champ"></div>
    <div id="role-popup-btns"></div>
  </div>
</div>

const ROLES=['TOP','JG','MID','BOT','SUP'];
const RJ={TOP:'トップ',JG:'ジャングル',MID:'ミッド',BOT:'ボット',SUP:'サポート'};
const RC={TOP:'#4a7aaa',JG:'#4a9a6a',MID:'#9a7aaa',BOT:'#aa7a4a',SUP:'#aa4a7a'};
const INI={AurelionSol:'AS',TwistedFate:'TF',DrMundo:'DM',MasterYi:'MY',MissFortune:'MF',MonkeyKing:'WK',TahmKench:'TK',XinZhao:'XZ',JarvanIV:'J4',LeeSin:'LS',KSante:'KS'};
function ini(c){return INI[c.k]||c.n.slice(0,2);}
function iconPath(k){return`https://ddragon.leagueoflegends.com/cdn/16.8.1/img/champion/${k}.png`;}

function iconEl(c,size){
  const r=size>40?6:4;
  const fs=size>40?12:9;
  return`<img src="${iconPath(c.k)}" width="${size}" height="${size}"
    style="border-radius:${r}px;object-fit:cover;display:block;flex-shrink:0;"
    onerror="this.outerHTML='<div style=width:${size}px;height:${size}px;border-radius:${r}px;background:${c.c};display:flex;align-items:center;justify-content:center;font-size:${fs}px;font-weight:700;color:#fff;flex-shrink:0>${ini(c)}</div>'">`;
}

// ===== ドラフト状態 =====
// phase: 'team-select' | 'fp-select' | 'ban' | 'pick'
let phase='team-select';
let myTeam=null;  // 'blue' or 'red'（自分のチーム色）
let fpTeam=null;  // 'blue' or 'red'（FPチーム）

// BANシーケンス: 味方5体 → 相手5体（myTeam確定後に生成）
function getBanOrder(){
  if(!myTeam)return[];
  const op=myTeam==='blue'?'red':'blue';
  return[myTeam,myTeam,myTeam,myTeam,myTeam,op,op,op,op,op];
}

let bans={blue:[null,null,null,null,null],red:[null,null,null,null,null]};
let banStep=0;

// PICKシーケンス (fp=ファーストピック側, op=相手側)
const PICK_SEQ_FP=['fp','op','op','fp','fp','op','op','fp','fp','op'];
let picks={blue:[null,null,null,null,null],red:[null,null,null,null,null]};
let pickStep=0;

let history=[];
let pendingChamp=null; // ロール選択待ちのチャンピオン
let filtered=[...CHAMPS];
let advTm=null,lastKey='';

function usedKeys(){
  const b=[...bans.blue,...bans.red].filter(Boolean).map(c=>c.k);
  const p=[...picks.blue,...picks.red].filter(Boolean).map(c=>c.k);
  return[...b,...p];
}

function filterChamps(){
  const raw=document.getElementById('search').value;
  const q=hira2kata(raw).toLowerCase();
  const qOrig=raw.toLowerCase();
  if(!q){filtered=[...CHAMPS];}
  else{
    filtered=CHAMPS.filter(c=>
      c.j.toLowerCase().includes(q)||
      hira2kata(c.h).toLowerCase().includes(q)||
      c.h.includes(qOrig)||
      c.n.toLowerCase().includes(qOrig)||
      c.k.toLowerCase().includes(qOrig)
    );
  }
  renderGrid();
}

function renderGrid(){
  const used=usedKeys();
  document.getElementById('champ-grid').innerHTML=filtered.map(c=>{
    const idx=CHAMPS.indexOf(c);
    const isUsed=used.includes(c.k);
    return`<div class="cc${isUsed?' used':''}" onclick="onChampClick(${idx})">
      <div style="position:relative;display:inline-block;">
        ${iconEl(c,52)}
      </div>
      <div class="cname">${c.j}</div>
    </div>`;
  }).join('');
}

function onChampClick(idx){
  const c=CHAMPS[idx];
  if(usedKeys().includes(c.k))return;

  const banOrder=getBanOrder();

  if(phase==='ban'){
    const team=banOrder[banStep];
    const slotIdx=bans[team].findIndex(x=>x===null);
    history.push({type:'ban',team,slotIdx,champ:c,banStep});
    bans[team][slotIdx]=c;
    banStep++;
    if(banStep>=10){
      phase='pick';
    }
    renderAll();
  } else if(phase==='pick'){
    const seqTeam=PICK_SEQ_FP[pickStep]==='fp'?fpTeam:(fpTeam==='blue'?'red':'blue');
    if(seqTeam===myTeam){
      // 味方チーム: ロール選択ポップアップを表示
      pendingChamp=c;
      showRolePopup(c);
    } else {
      // 相手チーム: 次の空きスロットへ順番に入れる
      const slotIdx=picks[seqTeam].findIndex(x=>x===null);
      history.push({type:'pick',team:seqTeam,slotIdx,champ:c,pickStep});
      picks[seqTeam][slotIdx]=c;
      pickStep++;
      renderAll();
      scheduleAdvice();
      if(pickStep>=10)fetchAdvice(true);
    }
  }
}

function showRolePopup(c){
  const popup=document.getElementById('role-popup');
  document.getElementById('role-popup-champ').innerHTML=
    `${iconEl(c,40)}<span class="role-popup-champ-name">${c.j}</span>`;
  document.getElementById('role-popup-btns').innerHTML=ROLES.map((role,i)=>{
    const taken=picks[myTeam][i]!==null;
    const rc=RC[role];
    return`<button class="role-btn"
      style="background:${rc}22;color:${rc};border:1px solid ${rc}44;"
      onclick="selectRole(${i})"
      ${taken?'disabled':''}>
      ${RJ[role]}${taken?' （確定済み）':''}
    </button>`;
  }).join('');
  popup.style.display='flex';
}

function selectRole(roleIdx){
  if(!pendingChamp)return;
  const c=pendingChamp;
  pendingChamp=null;
  document.getElementById('role-popup').style.display='none';
  history.push({type:'pick',team:myTeam,slotIdx:roleIdx,champ:c,pickStep});
  picks[myTeam][roleIdx]=c;
  pickStep++;
  renderAll();
  scheduleAdvice();
  if(pickStep>=10)fetchAdvice(true);
}

function closeRolePopup(e){
  if(e.target===document.getElementById('role-popup')){
    pendingChamp=null;
    document.getElementById('role-popup').style.display='none';
  }
}

function setMyTeam(color){
  myTeam=color;
  phase='fp-select';
  document.getElementById('team-select').style.display='none';
  document.getElementById('fp-select').style.display='block';
  renderAll();
}

function setFP(who){
  // who: 'mine'（味方がFP）or 'opponent'（相手がFP）
  fpTeam=who==='mine'?myTeam:(myTeam==='blue'?'red':'blue');
  phase='ban';
  document.getElementById('fp-select').style.display='none';
  renderAll();
}

function undoLast(){
  pendingChamp=null;
  document.getElementById('role-popup').style.display='none';
  if(!history.length)return;
  const last=history.pop();
  if(last.type==='ban'){
    bans[last.team][last.slotIdx]=null;
    banStep=last.banStep;
    phase='ban';
  } else {
    picks[last.team][last.slotIdx]=null;
    pickStep=last.pickStep;
    phase='pick';
  }
  renderAll();
  scheduleAdvice();
}

function resetAll(){
  pendingChamp=null;
  document.getElementById('role-popup').style.display='none';
  phase='team-select';
  myTeam=null;
  fpTeam=null;
  banStep=0;
  pickStep=0;
  history=[];
  bans={blue:[null,null,null,null,null],red:[null,null,null,null,null]};
  picks={blue:[null,null,null,null,null],red:[null,null,null,null,null]};
  document.getElementById('team-select').style.display='block';
  document.getElementById('fp-select').style.display='none';
  document.getElementById('advice-area').innerHTML='';
  document.getElementById('search').value='';
  filtered=[...CHAMPS];
  lastKey='';
  if(advTm)clearTimeout(advTm);
  renderAll();
}

function renderAll(){
  renderGrid();
  renderBans();
  renderPicks();
  renderPhaseBar();
}

function renderPhaseBar(){
  const title=document.getElementById('phase-title');
  const desc=document.getElementById('phase-desc');
  const count=document.getElementById('phase-count');

  if(phase==='team-select'){
    title.textContent='チーム選択';
    desc.textContent='あなたのチームカラーを選択';
    count.textContent='';
  } else if(phase==='fp-select'){
    title.textContent='FP選択';
    desc.textContent='ファーストピックのチームを選択';
    count.textContent='';
  } else if(phase==='ban'){
    title.textContent='BANフェーズ';
    const banOrder=getBanOrder();
    const banTeam=banOrder[banStep];
    const isMyBan=banTeam===myTeam;
    const teamLabel=isMyBan?'YOU':'相手';
    const teamColor=banTeam==='blue'?'#5b9cf6':'#f06060';
    desc.innerHTML=`次のBAN: <span style="color:${teamColor};font-weight:700">${teamLabel}</span>`;
    count.textContent=`${banStep}/10`;
  } else {
    title.textContent='PICKフェーズ';
    if(pickStep<10){
      const seqTeam=PICK_SEQ_FP[pickStep]==='fp'?fpTeam:(fpTeam==='blue'?'red':'blue');
      const isMyTurn=seqTeam===myTeam;
      const teamName=isMyTurn?'YOU':'相手';
      const teamColor=seqTeam==='blue'?'#5b9cf6':'#f06060';
      desc.innerHTML=`次のPICK: <span style="color:${teamColor};font-weight:700">${teamName}</span>`;
    } else {
      desc.textContent='全員確定！';
    }
    count.textContent=`${pickStep}/10`;
  }
}

function renderBans(){
  const banOrder=getBanOrder();

  // バンラベル更新
  const blueLbl=document.getElementById('blue-ban-label');
  const redLbl=document.getElementById('red-ban-label');
  if(myTeam){
    blueLbl.textContent=(myTeam==='blue'?'YOU':'相手')+' BAN';
    redLbl.textContent=(myTeam==='red'?'YOU':'相手')+' BAN';
  }

  const mk=(b,i,team)=>{
    const isNext=phase==='ban' && banOrder[banStep]===team && bans[team].filter(Boolean).length===i;
    const nextCls=isNext?(team==='blue'?' next-ban-blue':' next-ban-red'):'';
    const labelColor=team==='blue'?'#5b9cf6':'#f06060';
    if(!b)return`<div class="ban-slot${nextCls}">${isNext?`<div class="next-ban-lbl"><div class="next-ban-arrow" style="color:${labelColor}">▼</div><div class="next-ban-lbl-text" style="color:${labelColor}">BAN</div></div>`:''}</div>`;
    return`<div class="ban-slot filled">
      <img src="${iconPath(b.k)}" width="40" height="40"
        style="object-fit:cover;filter:grayscale(80%) brightness(0.35);display:block;"
        onerror="this.outerHTML='<div style=width:40px;height:40px;background:${b.c};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;filter:brightness(0.35)>${ini(b)}</div>'">
      <div class="ban-x">✕</div>
    </div>`;
  };
  document.getElementById('blue-bans').innerHTML=bans.blue.map((b,i)=>mk(b,i,'blue')).join('');
  document.getElementById('red-bans').innerHTML=bans.red.map((b,i)=>mk(b,i,'red')).join('');
}

function renderPicks(){
  // チームラベル更新
  const blueTeamLbl=document.getElementById('blue-team-label');
  const redTeamLbl=document.getElementById('red-team-label');
  if(myTeam){
    blueTeamLbl.textContent=myTeam==='blue'?'YOU':'相手チーム';
    redTeamLbl.textContent=myTeam==='red'?'YOU':'相手チーム';
  } else {
    blueTeamLbl.textContent='青チーム';
    redTeamLbl.textContent='赤チーム';
  }

  const mk=(c,slotIdx,team)=>{
    const f=!!c;
    const rc=RC[ROLES[slotIdx]]||'#4a6a8a';
    const role=ROLES[slotIdx];
    const isMyTeam=team===myTeam;
    const isMine=isMyTeam&&slotIdx===2; // ミッド=YOU

    // 相手チームのロールは番号表示
    const roleDisplay=isMyTeam?RJ[role]:`${slotIdx+1}番`;

    let isNext=false;
    if(phase==='pick'&&pickStep<10){
      const seqTeam=PICK_SEQ_FP[pickStep]==='fp'?fpTeam:(fpTeam==='blue'?'red':'blue');
      if(seqTeam===team){
        if(isMyTeam){
          // 味方ターンは全空きスロットをハイライト（ロール自由選択）
          isNext=!f;
        } else {
          // 相手ターンは次の空きスロットのみ
          const filled=picks[team].filter(Boolean).length;
          isNext=filled===slotIdx;
        }
      }
    }

    let cls='pick-slot ';
    if(!f)cls+=isNext?'pe next-pick':'pe';
    else{cls+=(team==='blue'?'pb':'pr');if(isMine)cls+=' pm';}

    return`<div class="${cls}">
      <div class="rdot" style="background:${rc}"></div>
      ${f
        ?`${iconEl(c,36)}
          <span class="sname" style="color:${team==='red'?'#f08888':'#c8d8f0'}">${c.j}</span>
          <span class="rbadge" style="background:${rc}22;color:${rc}">${roleDisplay}</span>
          ${isMine?'<span class="mbadge">YOU</span>':''}`
        :`<span style="font-size:11px;color:${isNext?'#C89B3C':'#1e3050'}">${roleDisplay}</span>`
      }
    </div>`;
  };
  document.getElementById('blue-picks').innerHTML=picks.blue.map((c,i)=>mk(c,i,'blue')).join('');
  document.getElementById('red-picks').innerHTML=picks.red.map((c,i)=>mk(c,i,'red')).join('');
}

function scheduleAdvice(){
  if(advTm)clearTimeout(advTm);
  const total=picks.blue.filter(Boolean).length+picks.red.filter(Boolean).length;
  if(total===0)return;
  if(total>=10)return;
  advTm=setTimeout(()=>fetchAdvice(false),1500);
}

function stateKey(){
  return picks.blue.map(c=>c?c.k:'_').join()+picks.red.map(c=>c?c.k:'_').join();
}

async function fetchAdvice(isFinal){
  const key=stateKey();
  if(key===lastKey&&!isFinal)return;
  lastKey=key;
  const area=document.getElementById('advice-area');
  area.innerHTML=`<div class="abox"><div class="lrow"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span>${isFinal?'最終アドバイスを生成中...':'ピック候補を更新中...'}</span></div></div>`;
  area.scrollIntoView({behavior:'smooth',block:'nearest'});

  const opTeam=myTeam==='blue'?'red':'blue';
  const myP=picks[myTeam].map((c,i)=>c?`${c.j}(${RJ[ROLES[i]]})`:null).filter(Boolean).join('、')||'なし';
  const opP=picks[opTeam].filter(Boolean).map((c,i)=>`${c.j}(${i+1}番)`).join('、')||'なし';
  const myB=bans[myTeam].filter(Boolean).map(c=>c.j).join('、')||'なし';
  const opB=bans[opTeam].filter(Boolean).map(c=>c.j).join('、')||'なし';
  const myMid=picks[myTeam][2];

  const prompt=isFinal
    ?`あなたはLoLの上級コーチです。以下のドラフト確定情報をもとに日本語で詳細アドバイスをください。

自チーム（YOU）: ${myP}
相手チーム: ${opP}
自チームのBAN: ${myB}
相手チームのBAN: ${opB}
自分のチャンピオン（ミッド）: ${myMid?myMid.j:'未確定'}

以下の4つのセクションで回答してください（プレーンテキスト、マークダウン不使用）：

【ビルドの方向性】
スタータアイテム→コアアイテム3〜4個（各選ぶ理由）・相手構成への対策アイテム・おすすめルーン（キーストーン＋サブツリー）・スキルオーダーの方針

【序盤の立ち回り】
レーンフェーズでの具体的な動き（CSの取り方・ポジション・ガンクケア）

【中盤〜終盤の動き】
ローテーション・オブジェクト優先度・チームファイトでの役割と動き

【構成の強みと注意点】
この構成で勝てる理由・負けパターン・相手への具体的な対策`
    :`あなたはLoLの上級コーチです。ドラフト途中の状況を踏まえて日本語で簡潔にアドバイスください。

自チーム（YOU）のピック済み: ${myP}
相手チームのピック済み: ${opP}
自チームのBAN: ${myB} / 相手のBAN: ${opB}
担当ロール: ミッド

【おすすめミッドピック】のセクションのみ回答してください：
相手の現在の構成と自チームの噛み合いを踏まえ、今ピックすべきミッドチャンピオンを3体、それぞれ1〜2文で理由を添えて教えてください。`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:isFinal?1200:500,messages:[{role:'user',content:prompt}]})
    });
    if(!res.ok){
      const err=await res.text();
      area.innerHTML=`<div class="abox"><div class="abody" style="color:#aa4040">APIエラー (${res.status}):<br>${esc(err.slice(0,300))}</div></div>`;
      return;
    }
    const data=await res.json();
    const text=data.content.map(b=>b.text||'').join('');

    if(isFinal){
      const secs=[
        {k:'ビルドの方向性',icon:'⚔',cls:''},
        {k:'序盤の立ち回り',icon:'◎',cls:''},
        {k:'中盤〜終盤の動き',icon:'◈',cls:''},
        {k:'構成の強みと注意点',icon:'★',cls:'gold'},
      ];
      let pos=[];
      secs.forEach(s=>{
        const m=new RegExp(`【${s.k}[^】]*】`).exec(text);
        if(m)pos.push({idx:m.index,end:m.index+m[0].length,sec:s});
      });
      pos.sort((a,b)=>a.idx-b.idx);
      const html=pos.map((p,i)=>{
        const end=i+1<pos.length?pos[i+1].idx:text.length;
        return`<div class="abox ${p.sec.cls}" style="margin-bottom:8px;">
          <div class="ahdr ${p.sec.cls?'g':''}">${p.sec.icon} ${p.sec.k}</div>
          <div class="abody">${esc(text.slice(p.end,end).trim())}</div>
        </div>`;
      }).join('');
      area.innerHTML=html||`<div class="abox gold"><div class="ahdr g">★ アドバイス</div><div class="abody">${esc(text.trim())}</div></div>`;
    }else{
      const m=text.match(/【おすすめミッドピック[^】]*】([\s\S]*)/);
      const content=m?m[1].trim():text.trim();
      area.innerHTML=`<div class="abox gold">
        <div class="ahdr g">
          <span>★ おすすめミッドピック</span>
          <span style="font-size:10px;color:#3a5070;font-weight:400">ピックが増えると自動更新</span>
        </div>
        <div class="abody">${esc(content)}</div>
      </div>`;
    }
    area.scrollIntoView({behavior:'smooth',block:'nearest'});
  }catch(e){
    area.innerHTML=`<div class="abox"><div class="abody" style="color:#aa4040">エラー: ${esc(String(e))}</div></div>`;
  }
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

renderAll();
</script>
</body>
</html>
